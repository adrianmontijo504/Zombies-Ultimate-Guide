<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ashes of the Damned - Undead Intel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="loaded">

  <div class="cursor-flame" aria-hidden="true">
    <span class="flame-outer"></span>
    <span class="flame-mid"></span>
    <span class="flame-core"></span>
    <span class="flame-spark spark-1"></span>
    <span class="flame-spark spark-2"></span>
    <span class="flame-spark spark-3"></span>
  </div>

  <canvas id="particles" aria-hidden="true"></canvas>

  <header class="glass page-header">
    <div class="header-left">
      <h1 class="site-title">
        <a href="../index.html">Undead Intel</a>
      </h1>
      <div class="page-subtitle">Ashes of the Damned</div>
    </div>

    <div class="top-buttons">
      <a class="back-link" href="../index.html">Home</a>
      <a class="back-link" href="../maps.html">Back to Maps</a>
    </div>
  </header>

  <section class="content">
    <h2>🧪 Easter Egg Tracker</h2>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <ul id="steps">
      <li><label><input type="checkbox"> Turn on power.</label></li>
      <li><label><input type="checkbox"> Open the lower crypt.</label></li>
      <li><label><input type="checkbox"> Collect skull fragments.</label></li>
      <li><label><input type="checkbox"> Build the cursed key.</label></li>
      <li><label><input type="checkbox"> Activate the fire pillars.</label></li>
      <li><label><input type="checkbox"> Enter the final encounter.</label></li>
    </ul>

    <h2>🔫 Notes</h2>
    <p>Add your full Ashes of the Damned guide steps here later.</p>
  </section>

  <script>
    const pageKey = "ashes_of_the_damned_";
    const checkboxes = document.querySelectorAll("#steps input");

    function updateProgress() {
      const total = checkboxes.length;
      const done = [...checkboxes].filter((checkbox) => checkbox.checked).length;
      document.getElementById("progress-bar").style.width = ((done / total) * 100) + "%";
    }

    checkboxes.forEach((box, index) => {
      const saved = localStorage.getItem(pageKey + index);
      if (saved === "true") box.checked = true;

      box.addEventListener("change", () => {
        localStorage.setItem(pageKey + index, box.checked);
        updateProgress();
      });
    });

    updateProgress();
  </script>

  <script src="../js/app.js"></script>
</body>
</html>
