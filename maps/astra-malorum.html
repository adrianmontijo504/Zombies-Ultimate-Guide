<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astra Malorum - Zombies Ultimate Guide</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="zombie-hand" aria-hidden="true">
    <div class="hand-palm"></div>
    <div class="finger finger-1"></div>
    <div class="finger finger-2"></div>
    <div class="finger finger-3"></div>
    <div class="finger finger-4"></div>
    <div class="thumb"></div>
    <div class="blood blood-1"></div>
    <div class="blood blood-2"></div>
    <div class="blood blood-3"></div>
  </div>

  <header class="glass page-header">
    <div class="header-left">
      <h1 class="site-title"><a href="../index.html">Zombies Ultimate Guide</a></h1>
      <div class="page-subtitle">Astra Malorum</div>
    </div>
  </header>

  <nav class="glass">
    <a href="../index.html">Home</a>
    <a href="../maps.html">Back to Maps</a>
  </nav>

  <main class="content">
    <img
      class="map-image"
      src="../images/astra-malorum-easter-egg-guide.jpg"
      alt="Astra Malorum Easter Egg Guide"
    />

    <h2>Astra Malorum Easter Egg Tracker</h2>

    <div id="progress-container" aria-hidden="true">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-text">0 / 6 complete</div>

    <ul id="steps">
      <li><div class="step-row"><input type="checkbox" id="step-1" /><label for="step-1">Turn on power.</label></div></li>
      <li><div class="step-row"><input type="checkbox" id="step-2" /><label for="step-2">Unlock the ritual room.</label></div></li>
      <li><div class="step-row"><input type="checkbox" id="step-3" /><label for="step-3">Collect the relic pieces.</label></div></li>
      <li><div class="step-row"><input type="checkbox" id="step-4" /><label for="step-4">Build the relic.</label></div></li>
      <li><div class="step-row"><input type="checkbox" id="step-5" /><label for="step-5">Charge the altar.</label></div></li>
      <li><div class="step-row"><input type="checkbox" id="step-6" /><label for="step-6">Start the boss fight.</label></div></li>
    </ul>

    <div class="notes-box">
      <h3>Notes</h3>
      <ul>
        <li>Replace these placeholder steps with your full Astra Malorum guide later.</li>
        <li>Your progress saves automatically in the browser.</li>
      </ul>
    </div>
  </main>

  <footer>© 2026 Zombies Ultimate Guide</footer>

  <script src="../app.js" defer></script>
</body>
</html>
