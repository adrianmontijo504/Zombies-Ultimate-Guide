<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paradox Junction</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/style.css">

<!-- 🔥 FORCE PAGE VISIBLE (FIX) -->
<style>
body {
  opacity: 1 !important;
}
</style>

</head>

<body>

<div class="cursor-glow"></div>

<header class="glass">
  <h1>Paradox Junction</h1>
  <a href="../index.html" style="color:#22c55e;">⬅ Back</a>
</header>

<section class="content">

<h2>🧪 Easter Egg Tracker</h2>

<div id="progress-container">
  <div id="progress-bar"></div>
</div>

<ul id="steps">
  <li><input type="checkbox"> Turn on power</li>
  <li><input type="checkbox"> Collect all parts</li>
  <li><input type="checkbox"> Build device</li>
  <li><input type="checkbox"> Activate portals</li>
  <li><input type="checkbox"> Boss fight</li>
</ul>

<h2>🔫 Best Weapons</h2>
<p>Ray Gun, Shotgun, Wonder Weapon</p>

</section>

<script>
const checkboxes = document.querySelectorAll("#steps input");

checkboxes.forEach((box, i) => {
  const saved = localStorage.getItem("step_" + i);
  if (saved === "true") box.checked = true;

  box.addEventListener("change", () => {
    localStorage.setItem("step_" + i, box.checked);
    update();
  });
});

function update() {
  let total = checkboxes.length;
  let done = [...checkboxes].filter(c => c.checked).length;
  document.getElementById("progress-bar").style.width =
    (done / total) * 100 + "%";
}

update();
</script>

<script src="../js/app.js"></script>

</body>
</html>
