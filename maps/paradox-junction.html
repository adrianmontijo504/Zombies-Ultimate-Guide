<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paradox Junction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="loaded">

  <div class="cursor-glow"></div>
  <canvas id="particles"></canvas>

  <header class="glass">
    <h1>Paradox Junction</h1>
    <div class="top-buttons">
      <a class="back-link" href="../index.html">🏠 Home</a>
      <a class="back-link" href="../maps.html">⬅ Back to Maps</a>
    </div>
  </header>

  <section class="content">
    <h2>🧪 Easter Egg Tracker</h2>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <ul id="steps">
      <li><label><input type="checkbox"> Turn on power</label></li>
      <li><label><input type="checkbox"> Collect all parts</label></li>
      <li><label><input type="checkbox"> Build device</label></li>
      <li><label><input type="checkbox"> Activate portals</label></li>
      <li><label><input type="checkbox"> Boss fight</label></li>
    </ul>

    <h2>🔫 Notes</h2>
    <p>Add your full Paradox Junction guide here.</p>
  </section>

  <script>
    const pageKey = "paradox_junction_";
    const checkboxes = document.querySelectorAll("#steps input");

    function updateProgress() {
      const total = checkboxes.length;
      const done = [...checkboxes].filter(c => c.checked).length;
      document.getElementById("progress-bar").style.width = ((done / total) * 100) + "%";
    }

    checkboxes.forEach((box, i) => {
      const saved = localStorage.getItem(pageKey + i);
      if (saved === "true") box.checked = true;

      box.addEventListener("change", () => {
        localStorage.setItem(pageKey + i, box.checked);
        updateProgress();
      });
    });

    updateProgress();
  </script>

  <script src="../js/app.js"></script>
</body>
</html>
