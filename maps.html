<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all zombie map guides on Undead Intel, including Easter egg walkthroughs and map help.">
  <meta name="theme-color" content="#000000">
  <title>Maps - Undead Intel</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="zombie-hand" aria-hidden="true"></div>
  <canvas id="particles" aria-hidden="true"></canvas>

  <header class="glass page-header">
    <div class="header-left">
      <h1 class="site-title">
        <a href="index.html">Undead Intel</a>
      </h1>
    </div>

    <input
      type="search"
      id="search"
      name="search"
      placeholder="Search maps..."
      aria-label="Search maps"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
  </header>

  <nav class="glass" aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="maps.html" aria-current="page">Maps</a>
  </nav>

  <main>
    <section class="hero hero-small">
      <h2>ALL ZOMBIES MAPS</h2>
      <p>Select a map below to open its full guide.</p>
    </section>

    <section id="guideList" class="grid" aria-label="Zombie maps">
      <article class="card" data-name="astra malorum easter egg guide">
        <a href="maps/astra-malorum.html" aria-label="Open Astra Malorum Easter Egg Guide">
          <img
            src="images/astra-malorum-easter-egg-guide.jpg"
            alt="Astra Malorum Easter Egg Guide"
            class="map-image"
          >
        </a>
        <h3>Astra Malorum</h3>
        <p>Easter Egg Guide</p>
        <a href="maps/astra-malorum.html">OPEN GUIDE</a>
      </article>

      <article class="card" data-name="ashes of the damned easter egg guide">
        <a href="maps/ashes-of-the-damned.html" aria-label="Open Ashes of the Damned Easter Egg Guide">
          <img
            src="images/ashes-of-the-damned-easter-egg-guide.jpg"
            alt="Ashes of the Damned Easter Egg Guide"
            class="map-image"
          >
        </a>
        <h3>Ashes of the Damned</h3>
        <p>Easter Egg Guide</p>
        <a href="maps/ashes-of-the-damned.html">OPEN GUIDE</a>
      </article>

      <article class="card" data-name="paradox junction easter egg guide">
        <a href="maps/paradox-junction.html" aria-label="Open Paradox Junction Easter Egg Guide">
          <img
            src="images/paradox-junction-easter-egg-guide.jpg"
            alt="Paradox Junction Easter Egg Guide"
            class="map-image"
          >
        </a>
        <h3>Paradox Junction</h3>
        <p>Easter Egg Guide</p>
        <a href="maps/paradox-junction.html">OPEN GUIDE</a>
      </article>
    </section>
  </main>

  <footer>
    <p>© 2026 axmpages</p>
  </footer>
</body>
</html>
