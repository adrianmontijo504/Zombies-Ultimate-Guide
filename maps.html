<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maps - Undead Intel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="loaded">

  <div class="cursor-flame" aria-hidden="true">
    <span class="flame-outer"></span>
    <span class="flame-mid"></span>
    <span class="flame-core"></span>
    <span class="flame-spark spark-1"></span>
    <span class="flame-spark spark-2"></span>
    <span class="flame-spark spark-3"></span>
  </div>

  <canvas id="particles" aria-hidden="true"></canvas>

  <header class="glass">
    <h1 class="site-title">
      <a href="index.html">🧟 Undead Intel</a>
    </h1>

    <input
      type="text"
      id="search"
      placeholder="Search maps..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
  </header>

  <nav class="glass">
    <a href="index.html">Home</a>
    <a href="maps.html">Maps</a>
  </nav>

  <section class="hero hero-small">
    <h2>ALL ZOMBIES MAPS</h2>
    <p>Select a map below to open its full guide.</p>
  </section>

  <section id="guideList" class="grid">

    <div class="card" data-name="astra malorum">
      <img src="images/astra-malorum.jpg" alt="Astra Malorum map image" class="map-image">
      <h3>Astra Malorum</h3>
      <p>Main quest guide</p>
      <a href="maps/astra-malorum.html">OPEN GUIDE</a>
    </div>

    <div class="card" data-name="ashes of the damned">
      <img src="images/ashes-of-the-damned.jpg" alt="Ashes of the Damned map image" class="map-image">
      <h3>Ashes of the Damned</h3>
      <p>Main quest guide</p>
      <a href="maps/ashes-of-the-damned.html">OPEN GUIDE</a>
    </div>

    <div class="card" data-name="paradox junction">
      <img src="images/paradox-junction.jpg" alt="Paradox Junction map image" class="map-image">
      <h3>Paradox Junction</h3>
      <p>Main quest guide</p>
      <a href="maps/paradox-junction.html">OPEN GUIDE</a>
    </div>

  </section>

  <footer>
    <p>© 2026 axmpages</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
