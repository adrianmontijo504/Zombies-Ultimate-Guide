<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maps - Undead Intel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="loaded">

  <div class="zombie-hand" aria-hidden="true">
    <span class="hand-palm"></span>
    <span class="finger finger-1"></span>
    <span class="finger finger-2"></span>
    <span class="finger finger-3"></span>
    <span class="finger finger-4"></span>
    <span class="thumb"></span>
    <span class="blood blood-1"></span>
    <span class="blood blood-2"></span>
    <span class="blood blood-3"></span>
  </div>

  <canvas id="particles" aria-hidden="true"></canvas>

  <header class="glass">
    <h1 class="site-title">
      <a href="index.html">Undead Intel</a>
    </h1>

    <input
      type="text"
      id="search"
      placeholder="Search maps..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
  </header>

  <nav class="glass">
    <a href="index.html">Home</a>
    <a href="maps.html">Maps</a>
  </nav>

  <section class="hero hero-small">
    <h2>ALL ZOMBIES MAPS</h2>
    <p>Select a map below to open its full guide.</p>
  </section>

  <section id="guideList" class="grid">
    <div class="card" data-name="astra malorum">
      <a href="maps/astra-malorum.html">
        <img src="images/astra-malorum-easter-egg-guide.jpg" alt="Astra Malorum Easter Egg Guide" class="map-image">
      </a>
      <h3>Astra Malorum</h3>
      <p>Easter Egg Guide</p>
      <a href="maps/astra-malorum.html">OPEN GUIDE</a>
    </div>

    <div class="card" data-name="ashes of the damned">
      <a href="maps/ashes-of-the-damned.html">
        <img src="images/ashes-of-the-damned-easter-egg-guide.jpg" alt="Ashes of the Damned Easter Egg Guide" class="map-image">
      </a>
      <h3>Ashes of the Damned</h3>
      <p>Easter Egg Guide</p>
      <a href="maps/ashes-of-the-damned.html">OPEN GUIDE</a>
    </div>

    <div class="card" data-name="paradox junction">
      <a href="maps/paradox-junction.html">
        <img src="images/paradox-junction-easter-egg-guide.jpg" alt="Paradox Junction Easter Egg Guide" class="map-image">
      </a>
      <h3>Paradox Junction</h3>
      <p>Easter Egg Guide</p>
      <a href="maps/paradox-junction.html">OPEN GUIDE</a>
    </div>
  </section>

  <footer>
    <p>© 2026 axmpages</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
