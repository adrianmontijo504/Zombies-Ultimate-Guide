<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Undead Intel - zombie map guides, Easter egg walkthroughs, and survival help.">
  <meta name="theme-color" content="#000000">
  <title>Undead Intel</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="zombie-hand" aria-hidden="true"></div>
  <canvas id="particles" aria-hidden="true"></canvas>

      <h1 class="site-title">
        <a href="index.html">Undead Intel</a>

    <input
      type="search"
      id="search"
      name="search"

      autocorrect="off"
      autocapitalize="off"

    <a href="index.html">Home</a>

      <h2>MOST RECENT MAP</h2>

            src="images/paradox-junction-easter-egg-guide.jpg"

    <p>© 2026 axmpages</p>
